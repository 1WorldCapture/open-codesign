<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7F5F1"/>
      <stop offset="100%" stop-color="#EDE8DF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="640" height="480" fill="url(#bg)"/>

  <!-- grain overlay -->
  <rect width="640" height="480" fill="#C96442" opacity="0.02"/>

  <!-- Top headline -->
  <text x="320" y="64" text-anchor="middle"
        font-family="'PingFang SC','Helvetica Neue',system-ui,sans-serif"
        font-size="22" font-weight="600" fill="#1a1a1a">
    把 Open CoDesign 拖到「应用程序」
  </text>
  <text x="320" y="94" text-anchor="middle"
        font-family="'SF Pro Text','Helvetica Neue',system-ui,sans-serif"
        font-size="14" fill="#6b6b6b" letter-spacing="0.5">
    Drag Open CoDesign into Applications to install
  </text>

  <!-- Arrow — a single deliberate stroke across the middle -->
  <g stroke="#C96442" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="240" y1="260" x2="400" y2="260"/>
    <polyline points="378,240 402,260 378,280"/>
  </g>

  <!-- Caption under arrow -->
  <text x="320" y="310" text-anchor="middle"
        font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="12" fill="#9a9a9a" letter-spacing="0.4">
    拖到这里 · drop here
  </text>

  <!-- Icon slot labels (the actual icons get positioned by electron-builder over this bg) -->
  <text x="140" y="400" text-anchor="middle"
        font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#9a9a9a">
    Open CoDesign
  </text>
  <text x="500" y="400" text-anchor="middle"
        font-family="'SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#9a9a9a">
    Applications
  </text>

  <!-- Warning footer -->
  <rect x="0" y="432" width="640" height="48" fill="#1a1a1a" opacity="0.04"/>
  <text x="320" y="454" text-anchor="middle"
        font-family="'PingFang SC','SF Pro Text',system-ui,sans-serif"
        font-size="11" fill="#6b6b6b">
    直接从 DMG 双击运行会导致钥匙串不可用 · Double-clicking from the DMG leaves the keychain broken
  </text>
  <text x="320" y="470" text-anchor="middle"
        font-family="'SF Pro Text',monospace"
        font-size="9" fill="#b0b0b0" letter-spacing="0.3">
    OPEN-CODESIGN · OPEN-SOURCE AI DESIGN TOOL
  </text>
</svg>
